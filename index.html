<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Static digital business card.">
    <title>Digital Business Card</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/config.js" defer></script>
    <script src="js/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#card">Skip to card</a>

    <main class="site-shell">
      <section class="card" id="card" aria-labelledby="representative-name">
        <p class="placeholder-notice" data-field="placeholderNotice">
          Placeholder business information. Replace before launch.
        </p>

        <header class="card-header">
          <div class="logo-mark" data-field="companyInitials" aria-hidden="true"></div>
          <div class="identity">
            <p class="eyebrow" data-field="companyTagline"></p>
            <h1 id="representative-name" data-field="representativeName"></h1>
            <p class="role" data-field="representativeTitle"></p>
          </div>
        </header>

        <section class="company-summary" aria-labelledby="company-heading">
          <h2 id="company-heading" data-field="companyName"></h2>
          <p data-field="companyDescription"></p>
        </section>

        <section aria-labelledby="contact-heading">
          <h2 id="contact-heading">Contact Actions</h2>
          <div class="action-grid" id="contact-actions"></div>
        </section>

        <section class="details-panel" aria-labelledby="details-heading">
          <h2 id="details-heading">Public Details</h2>
          <dl class="details-list">
            <div>
              <dt>Service Area</dt>
              <dd data-field="serviceArea"></dd>
            </div>
            <div>
              <dt>Public Card URL</dt>
              <dd data-field="publicCardUrl"></dd>
            </div>
          </dl>
        </section>

        <section class="next-features" aria-labelledby="next-features-heading">
          <h2 id="next-features-heading">Planned Features</h2>
          <ul id="planned-features"></ul>
        </section>
      </section>
    </main>
  </body>
</html>
